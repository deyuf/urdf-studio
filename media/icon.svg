<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Background: deep midnight gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B1B3A"/>
      <stop offset="55%" stop-color="#15163A"/>
      <stop offset="100%" stop-color="#0A0B22"/>
    </linearGradient>

    <!-- Subtle inner glow at upper-left -->
    <radialGradient id="bgGlow" cx="0.25" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#5B6CFF" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#5B6CFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#5B6CFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner rim highlight (top-down: bright at top, fades to nothing) -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B8C4FF" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Arm link gradient (blue → cyan) -->
    <linearGradient id="linkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C8CFF"/>
      <stop offset="55%" stop-color="#4B7BFF"/>
      <stop offset="100%" stop-color="#1F4FE0"/>
    </linearGradient>

    <!-- Base disc (top face): brighter center, darker edges -->
    <radialGradient id="baseTopGrad" cx="0.4" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#6A7AD0"/>
      <stop offset="60%" stop-color="#3B4080"/>
      <stop offset="100%" stop-color="#1E2050"/>
    </radialGradient>

    <!-- Base side: lighter top fading to dark bottom -->
    <linearGradient id="baseSideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3F75"/>
      <stop offset="100%" stop-color="#15163A"/>
    </linearGradient>

    <!-- Joint highlight gradient (cyan glow) -->
    <radialGradient id="jointGrad" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#B6F0FF"/>
      <stop offset="45%" stop-color="#5BD4FF"/>
      <stop offset="100%" stop-color="#1885C8"/>
    </radialGradient>

    <!-- End effector gradient (magenta/pink) -->
    <radialGradient id="tipGrad" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#FFD6E7"/>
      <stop offset="45%" stop-color="#FF6BB5"/>
      <stop offset="100%" stop-color="#C8217A"/>
    </radialGradient>

    <!-- Soft glow filter — userSpaceOnUse so vertical primitives with zero-width
         bbox (e.g. the column) don't get clipped to a thin strip. -->
    <filter id="softGlow" filterUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for joints/tip -->
    <filter id="hotGlow" filterUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow (just blur, used under base) -->
    <filter id="shadowBlur" filterUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="52" fill="url(#bgGrad)"/>
  <rect width="256" height="256" rx="52" fill="url(#bgGlow)"/>

  <!-- Inner rim highlight: 1.5px stroke fading from top -->
  <rect x="1.25" y="1.25" width="253.5" height="253.5" rx="50.75"
        fill="none" stroke="url(#rimGrad)" stroke-width="1.5"/>

  <!-- Subtle workspace grid (perspective floor) -->
  <g opacity="0.18" stroke="#7B8CFF" stroke-width="1">
    <line x1="32" y1="208" x2="224" y2="208"/>
    <line x1="44" y1="184" x2="212" y2="184"/>
    <line x1="56" y1="164" x2="200" y2="164"/>
    <line x1="68" y1="148" x2="188" y2="148"/>
  </g>
  <g opacity="0.12" stroke="#7B8CFF" stroke-width="1">
    <line x1="64" y1="148" x2="32" y2="208"/>
    <line x1="104" y1="148" x2="96" y2="208"/>
    <line x1="152" y1="148" x2="160" y2="208"/>
    <line x1="192" y1="148" x2="224" y2="208"/>
  </g>

  <!-- ========== BASE (cylinder) ========== -->
  <!-- Cast shadow on floor -->
  <ellipse cx="84" cy="222" rx="38" ry="5" fill="#000" opacity="0.55" filter="url(#shadowBlur)"/>

  <!-- Cylinder side (a "band" with bottom curve to suggest underside) -->
  <path d="M 56 204 L 56 214 A 28 5 0 0 0 112 214 L 112 204 Z"
        fill="url(#baseSideGrad)"/>
  <!-- Side seam highlights at far left/right edges -->
  <line x1="56" y1="204" x2="56" y2="213" stroke="#7B8CFF" stroke-width="0.8" opacity="0.45"/>
  <line x1="112" y1="204" x2="112" y2="213" stroke="#7B8CFF" stroke-width="0.8" opacity="0.25"/>

  <!-- ========== COLUMN (Link 1) — unified capsule style ========== -->
  <!-- Drawn BEFORE the disc top so its rounded bottom is hidden inside the base.
       Rendered as a rounded rect (not a vertical line) so the gradient and filter
       have a non-degenerate bounding box. -->
  <g filter="url(#softGlow)">
    <rect x="73" y="129" width="22" height="82" rx="11" ry="11" fill="url(#linkGrad)"/>
    <!-- Highlight stripe on left side -->
    <rect x="75" y="138" width="3" height="56" rx="1.5" ry="1.5" fill="#fff" opacity="0.28"/>
  </g>

  <!-- Cylinder top disc — covers column's round bottom, making column "root into" base -->
  <ellipse cx="84" cy="204" rx="28" ry="7" fill="url(#baseTopGrad)"/>
  <!-- Back rim highlight (upper edge of disc) -->
  <path d="M 56 204 A 28 7 0 0 1 112 204"
        stroke="#8A9BFF" stroke-width="1.2" fill="none" opacity="0.55"/>
  <!-- Soft front-edge inner highlight (upper-left arc, suggests light from upper-left) -->
  <path d="M 60 199 Q 78 195 96 196"
        stroke="#A6B4FF" stroke-width="1" fill="none" opacity="0.45" stroke-linecap="round"/>

  <!-- ========== LINK 2 (shoulder → elbow) ========== -->
  <g filter="url(#softGlow)">
    <line x1="84" y1="140" x2="152" y2="92"
          stroke="url(#linkGrad)" stroke-width="20" stroke-linecap="round"/>
    <line x1="86" y1="134" x2="150" y2="86"
          stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- ========== LINK 3 (elbow → wrist) ========== -->
  <g filter="url(#softGlow)">
    <line x1="152" y1="92" x2="200" y2="64"
          stroke="url(#linkGrad)" stroke-width="14" stroke-linecap="round"/>
    <line x1="153" y1="88" x2="199" y2="60"
          stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- ========== JOINTS ========== -->
  <!-- Shoulder -->
  <g filter="url(#hotGlow)">
    <circle cx="84" cy="140" r="14" fill="url(#jointGrad)"/>
    <circle cx="84" cy="140" r="14" fill="none" stroke="#0A0B22" stroke-width="2"/>
    <circle cx="84" cy="140" r="4.5" fill="#0A0B22"/>
  </g>
  <!-- Elbow -->
  <g filter="url(#hotGlow)">
    <circle cx="152" cy="92" r="12" fill="url(#jointGrad)"/>
    <circle cx="152" cy="92" r="12" fill="none" stroke="#0A0B22" stroke-width="2"/>
    <circle cx="152" cy="92" r="4" fill="#0A0B22"/>
  </g>

  <!-- ========== END EFFECTOR ========== -->
  <g filter="url(#hotGlow)">
    <circle cx="200" cy="64" r="11" fill="url(#tipGrad)"/>
    <circle cx="200" cy="64" r="11" fill="none" stroke="#0A0B22" stroke-width="2"/>
    <circle cx="200" cy="64" r="3" fill="#fff" opacity="0.85"/>
  </g>
</svg>
