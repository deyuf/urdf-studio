<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background -->
  <rect width="256" height="256" rx="24" fill="#1E1E2E"/>
  
  <!-- Grid lines for "studio" feel -->
  <line x1="40" y1="216" x2="216" y2="216" stroke="#3B3B5C" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="186" x2="216" y2="186" stroke="#3B3B5C" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="156" x2="216" y2="156" stroke="#3B3B5C" stroke-width="1" opacity="0.2"/>
  
  <!-- Robot arm - Link 1 (base to shoulder) -->
  <line x1="88" y1="200" x2="88" y2="140" stroke="#6C9BF2" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Robot arm - Link 2 (shoulder to elbow) -->
  <line x1="88" y1="140" x2="148" y2="90" stroke="#6C9BF2" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Robot arm - Link 3 (elbow to wrist) -->
  <line x1="148" y1="90" x2="192" y2="68" stroke="#6C9BF2" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Joint circles -->
  <!-- Base joint -->
  <circle cx="88" cy="200" r="14" fill="#4FC1FF" stroke="#2A2A4A" stroke-width="3"/>
  <circle cx="88" cy="200" r="5" fill="#1E1E2E"/>
  
  <!-- Shoulder joint -->
  <circle cx="88" cy="140" r="12" fill="#4FC1FF" stroke="#2A2A4A" stroke-width="3"/>
  <circle cx="88" cy="140" r="4" fill="#1E1E2E"/>
  
  <!-- Elbow joint -->
  <circle cx="148" cy="90" r="10" fill="#4FC1FF" stroke="#2A2A4A" stroke-width="3"/>
  <circle cx="148" cy="90" r="3.5" fill="#1E1E2E"/>
  
  <!-- End effector -->
  <circle cx="192" cy="68" r="8" fill="#FF6B9D" stroke="#2A2A4A" stroke-width="2.5"/>
  
  <!-- Coordinate axes at base -->
  <line x1="60" y1="216" x2="60" y2="196" stroke="#4ADE80" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="60,192 56,198 64,198" fill="#4ADE80"/>
  <line x1="60" y1="216" x2="80" y2="216" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="84,216 78,212 78,220" fill="#F87171"/>
  
  <!-- Arc showing joint rotation -->
  <path d="M 100 152 A 20 20 0 0 1 80 128" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>
  <path d="M 158 102 A 16 16 0 0 1 140 78" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>
  
  <!-- "URDF" text hint - small label -->
  <text x="160" y="200" font-family="monospace" font-size="22" font-weight="bold" fill="#8B8BAF" opacity="0.6">URDF</text>
</svg>
