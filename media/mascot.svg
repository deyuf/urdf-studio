<!--
  URDF Studio mascot — a little robot arm that waves, blinks, and tosses
  sparkles. SMIL animations only (works inline in GitHub markdown). Light
  and dark friendly colours; transparent background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -10 420 210" width="420" height="210" role="img" aria-label="A small robot arm waving with floating sparkles">
  <title>URDF Studio mascot</title>

  <defs>
    <linearGradient id="armA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aecbfa"/>
      <stop offset="1" stop-color="#1a73e8"/>
    </linearGradient>
    <linearGradient id="armB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c58af9"/>
      <stop offset="1" stop-color="#a142f4"/>
    </linearGradient>
    <linearGradient id="headG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde293"/>
      <stop offset="1" stop-color="#f29900"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fad2cf" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fad2cf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground line -->
  <line x1="40" y1="180" x2="380" y2="180"
        stroke="#80868b" stroke-width="1.2"
        stroke-dasharray="4 5" opacity="0.45"/>

  <!-- base plate + post -->
  <g>
    <rect x="190" y="160" width="40" height="20" rx="5" fill="#5f6368"/>
    <rect x="200" y="150" width="20" height="12" rx="3" fill="#80868b"/>
  </g>

  <!-- arm assembly. Origin = base joint at (210, 150). -->
  <g transform="translate(210 150)">
    <animateTransform attributeName="transform" type="rotate"
                      values="-10;22;-10" dur="4.5s"
                      keyTimes="0;0.5;1"
                      calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
                      repeatCount="indefinite" additive="sum"/>

    <!-- lower-arm segment -->
    <rect x="-9" y="-62" width="18" height="62" rx="9" fill="url(#armA)"/>
    <!-- screws / detail dots -->
    <circle cx="0" cy="-12" r="1.4" fill="#fff" opacity="0.55"/>
    <circle cx="0" cy="-50" r="1.4" fill="#fff" opacity="0.55"/>
    <!-- base joint cap -->
    <circle cx="0" cy="0" r="7" fill="#aecbfa" stroke="#1a73e8" stroke-width="2"/>
    <circle cx="0" cy="0" r="2.2" fill="#1a73e8"/>

    <!-- upper-arm assembly. Origin = elbow joint at top of the lower arm. -->
    <g transform="translate(0 -62)">
      <animateTransform attributeName="transform" type="rotate"
                        values="-18;30;-18" dur="3.2s"
                        keyTimes="0;0.5;1"
                        calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
                        repeatCount="indefinite" additive="sum"/>

      <!-- elbow joint -->
      <circle cx="0" cy="0" r="6" fill="#c58af9" stroke="#a142f4" stroke-width="2"/>
      <circle cx="0" cy="0" r="2" fill="#a142f4"/>

      <!-- upper-arm segment -->
      <rect x="-8" y="-56" width="16" height="56" rx="8" fill="url(#armB)"/>
      <circle cx="0" cy="-12" r="1.2" fill="#fff" opacity="0.55"/>
      <circle cx="0" cy="-44" r="1.2" fill="#fff" opacity="0.55"/>

      <!-- the head: a friendly little orange ball that blinks.
           Static transform places the head at translate(0 -68) from the
           elbow. The wobble animation uses additive="sum" with small DELTA
           values (0..-3..0) so it bobs ~3 px on top of the static position.
           The previous version used absolute values (0,-68) here, which on
           top of the parent's static translate(0 -68) added up to (0,-136)
           and pushed the head far above the canvas — making the smile
           effectively invisible. -->
      <g transform="translate(0 -68)">
        <animateTransform attributeName="transform" type="translate"
                          values="0,0; 0,-3; 0,0" dur="2.4s"
                          repeatCount="indefinite" additive="sum"/>
        <!-- head fill -->
        <circle cx="0" cy="0" r="20" fill="url(#headG)" stroke="#e37400" stroke-width="2"/>
        <!-- cheek blush -->
        <ellipse cx="-8" cy="4" rx="6" ry="3.5" fill="url(#cheek)"/>
        <ellipse cx="8"  cy="4" rx="6" ry="3.5" fill="url(#cheek)"/>
        <!-- eyes: blink once every cycle -->
        <ellipse cx="-6" cy="-2" rx="2.4" ry="3.4" fill="#202124">
          <animate attributeName="ry" values="3.4;3.4;0.3;3.4" keyTimes="0;0.85;0.9;1" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="6"  cy="-2" rx="2.4" ry="3.4" fill="#202124">
          <animate attributeName="ry" values="3.4;3.4;0.3;3.4" keyTimes="0;0.85;0.9;1" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <!-- smile: wider, deeper, thicker stroke so it reads at 420 px wide -->
        <path d="M -7 5 Q 0 11 7 5" stroke="#202124" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- little antenna -->
        <line x1="0" y1="-20" x2="0" y2="-26" stroke="#e37400" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="0" cy="-28" r="2.6" fill="#fbbc04">
          <animate attributeName="r" values="2.6;3.4;2.6" dur="1.6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>

  <!-- floating sparkles, slightly off-tempo -->
  <g fill="#fbbc04">
    <path d="M 80 50 l 2 0 l 0 -6 l 1.4 0 l 0 6 l 6 0 l 0 1.4 l -6 0 l 0 6 l -1.4 0 l 0 -6 l -6 0 z" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" repeatCount="indefinite" begin="0s"/>
      <animateTransform attributeName="transform" type="translate" values="0,4;0,-4;0,4" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>
  <g fill="#34a853">
    <path d="M 340 60 l 2 0 l 0 -5 l 1.2 0 l 0 5 l 5 0 l 0 1.2 l -5 0 l 0 5 l -1.2 0 l 0 -5 l -5 0 z" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" repeatCount="indefinite" begin="0.7s"/>
      <animateTransform attributeName="transform" type="translate" values="0,-4;0,4;0,-4" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>
  <g fill="#ea4335">
    <path d="M 330 130 l 2 0 l 0 -5 l 1.2 0 l 0 5 l 5 0 l 0 1.2 l -5 0 l 0 5 l -1.2 0 l 0 -5 l -5 0 z" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" repeatCount="indefinite" begin="1.4s"/>
      <animateTransform attributeName="transform" type="translate" values="0,3;0,-3;0,3" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>
  <g fill="#4285f4">
    <path d="M 70 130 l 2 0 l 0 -5 l 1.2 0 l 0 5 l 5 0 l 0 1.2 l -5 0 l 0 5 l -1.2 0 l 0 -5 l -5 0 z" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" repeatCount="indefinite" begin="2s"/>
      <animateTransform attributeName="transform" type="translate" values="0,-3;0,3;0,-3" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
