        <h1>URDF Studio — Free online URDF viewer in the browser</h1>
        <p><strong>URDF Studio</strong> is a free, open-source <strong>URDF viewer</strong> and
        xacro inspector that runs entirely in your browser. Open a ROS robot
        description folder, expand <code>xacro</code> macros, resolve
        <code>package://</code> URIs, drive joint sliders, and validate
        inertias — without uploading any files to a server.</p>
        <p>This page is the interactive web app. It requires JavaScript.
        Re-enable JavaScript or visit the
        <a href="./docs/">documentation</a> to learn more.</p>
        <h2>What URDF Studio does</h2>
        <ul>
          <li>Online URDF viewer: load <code>.urdf</code> and
          <code>.urdf.xacro</code> files from a local folder.</li>
          <li>Full xacro expansion with <code>xacro:include</code>,
          <code>xacro:macro</code>, <code>xacro:arg</code>,
          <code>load_yaml</code>.</li>
          <li>Resolves ROS <code>package://</code> mesh paths against
          <code>package.xml</code> files in the chosen folder.</li>
          <li>Joint sliders, visual / collision render modes, link tree,
          inspector with mass, center of mass and inertia tensor.</li>
          <li>Validates URDF parse errors, missing meshes, non-positive-
          definite inertias, and joint cycles.</li>
          <li>Also available as a <a href="https://marketplace.visualstudio.com/items?itemName=deyuf.urdf-studio">VS Code extension</a>.</li>
        </ul>
        <p><a href="./docs/">Read the docs →</a> ·
        <a href="https://github.com/deyuf/urdf-studio">Source on GitHub →</a></p>
