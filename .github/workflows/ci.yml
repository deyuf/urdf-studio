name: CI

# Tests run on every branch push and every PR — feature branches included.
# Production deploy and Marketplace publish workflows are gated to main only;
# see deploy-web.yml and publish.yml.
on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, unit and renderer tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Unit tests
        run: npm run test:unit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build VS Code extension
        run: npm run compile

      - name: Build web bundle
        run: npm run web:build

      - name: Playwright (renderer + web shell)
        run: npx playwright test
        env:
          # Surface page errors in CI logs.
          DEBUG: pw:browser*
        continue-on-error: false

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
