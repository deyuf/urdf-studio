name: Preview web app on Cloudflare Pages

# Deployments are restricted to the main branch (see deploy-web.yml). This
# workflow exists for ad-hoc preview deploys of feature branches and is
# triggered manually only — pass the branch name to deploy a preview that
# Cloudflare Pages serves under <branch>.urdf-studio.pages.dev.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to deploy as a preview (defaults to the workflow ref).'
        required: false
        type: string

concurrency:
  group: preview-web-${{ github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build web bundle and docs
        run: npm run web:build

      - name: Resolve preview branch alias
        id: alias
        run: |
          alias='${{ github.event.inputs.branch || github.ref_name }}'
          # Cloudflare Pages branch aliases must match [a-z0-9-]; squash other chars.
          alias=$(echo "$alias" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          echo "alias=$alias" >> "$GITHUB_OUTPUT"
          echo "Resolved alias: $alias"

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-web --project-name=urdf-studio --branch=${{ steps.alias.outputs.alias }}
