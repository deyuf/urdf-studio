name: Publish to VS Code Marketplace

# Triggered only after the CI workflow finishes successfully on main. CI
# already covers type-check + unit + Playwright; we don't repeat that here.
# Manual dispatch is still allowed (gated to main via the job-level if).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish even if package.json version is unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pin to the exact commit CI ran on; need history for version diff.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Detect version change
        id: version
        run: |
          current=$(node -p "require('./package.json').version")
          previous=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          force='${{ github.event.inputs.force }}'
          if [ "$current" != "$previous" ] || [ "$force" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $previous -> $current (force=$force) — will publish."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged at $current — skipping publish."
          fi

      - name: Package .vsix
        if: steps.version.outputs.should_publish == 'true'
        run: npx --yes @vscode/vsce package --out urdf-studio-${{ steps.version.outputs.current }}.vsix

      - name: Publish to Marketplace
        if: steps.version.outputs.should_publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath urdf-studio-${{ steps.version.outputs.current }}.vsix

      - name: Create GitHub Release
        if: steps.version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          generate_release_notes: true
          files: urdf-studio-${{ steps.version.outputs.current }}.vsix
