name: Deploy web app to Cloudflare Pages

# Triggered only after the CI workflow finishes successfully on main. Manual
# dispatch is also allowed (still gated to main via the job-level if-condition).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

env:
  PAGES_PROJECT: urdf-studio
  WRANGLER_VERSION: '4'

jobs:
  deploy:
    # Hard gates:
    #   - main branch only.
    #   - For workflow_run triggers, the upstream CI must have succeeded.
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, check out the same commit CI ran on.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify Cloudflare secrets are configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          [ -z "$CLOUDFLARE_API_TOKEN"  ] && missing+=(CLOUDFLARE_API_TOKEN)
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing+=(CLOUDFLARE_ACCOUNT_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Configure them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets present (token=${#CLOUDFLARE_API_TOKEN} chars, account=${#CLOUDFLARE_ACCOUNT_ID} chars)."

      - run: npm ci

      - name: Build web bundle and docs
        run: npm run web:build

      - name: Verify build output
        run: |
          test -f dist-web/index.html || { echo "::error::dist-web/index.html missing"; exit 1; }
          test -f dist-web/app.js     || { echo "::error::dist-web/app.js missing";     exit 1; }
          test -d dist-web/docs       || { echo "::error::dist-web/docs missing";       exit 1; }
          echo "Build output looks healthy:"
          du -sh dist-web

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if npx --yes wrangler@${WRANGLER_VERSION} pages project list 2>/dev/null \
             | awk '{print $1}' | grep -Fxq "$PAGES_PROJECT"; then
            echo "Project '$PAGES_PROJECT' already exists."
          else
            echo "Creating Cloudflare Pages project '$PAGES_PROJECT'..."
            npx --yes wrangler@${WRANGLER_VERSION} pages project create "$PAGES_PROJECT" \
              --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: pages deploy dist-web --project-name=${{ env.PAGES_PROJECT }} --branch=main --commit-dirty=true
