name: Release pipeline

# Single workflow handling the full CI → deploy chain:
#
#   test (always)
#     ├──▶ deploy-web         (main only,    needs test)
#     ├──▶ preview-web        (non-main pushes, needs test)
#     ├──▶ publish            (main only,    needs test, skips if version unchanged)
#     ├──▶ publish-prerelease (develop only, needs test, every push)
#     └──▶ deploy-docs        (main only,    needs deploy-web + publish)
#
# Marketplace lanes (Microsoft convention — odd minor = pre-release):
#   stable:      0.4.x  (published from `main`)
#   pre-release: 0.5.x  (published from `develop`, every push)
#
# Manual ad-hoc previews live in preview-web.yml.

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Publish to the Marketplace even if package.json version is unchanged'
        type: boolean
        default: false

# Cancel in-progress runs for the same PR; never cancel main runs (they ship).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PAGES_PROJECT: urdf-studio

jobs:
  # =================================================================
  # test — runs on every branch push and every PR.
  # Uploads the production web build as an artifact so the downstream
  # deploy jobs don't have to rebuild.
  # =================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build VS Code extension
        run: npm run compile

      - name: Build web bundle (incl. docs)
        run: npm run web:build

      - name: Playwright (renderer + web shell)
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

      # Hand the built web app to the deploy jobs. Only on main pushes /
      # manual dispatch — no point building artifacts for PR runs.
      - name: Upload web build artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist-web
          retention-days: 1

  # =================================================================
  # deploy-web — production deploy to Cloudflare Pages.
  # Only on main, only after tests pass. Uses the artifact built by
  # the test job so we don't rebuild.
  # =================================================================
  deploy-web:
    name: Deploy web app to Cloudflare Pages
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Verify Cloudflare secrets are configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          [ -z "$CLOUDFLARE_API_TOKEN"  ] && missing+=(CLOUDFLARE_API_TOKEN)
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing+=(CLOUDFLARE_ACCOUNT_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            cat <<EOF >&2
          ::error::Missing required secrets: ${missing[*]}

          Configure them under Settings → Secrets and variables → Actions.

          To get them:
            1. Account ID — visible in any Cloudflare dashboard page (right sidebar).
            2. API Token — https://dash.cloudflare.com/profile/api-tokens
                 → Create Token → Custom → grant:
                     Account · Cloudflare Pages · Edit
                     User    · User Details     · Read
                 → constrain to your account → Continue → Create.

          See docs/development/deployment.md for the full walk-through.
          EOF
            exit 1
          fi
          echo "Secrets present (token=${#CLOUDFLARE_API_TOKEN} chars, account=${#CLOUDFLARE_ACCOUNT_ID} chars)."

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist-web

      - name: Verify build output
        run: |
          test -f dist-web/index.html || { echo "::error::dist-web/index.html missing"; exit 1; }
          test -f dist-web/app.js     || { echo "::error::dist-web/app.js missing";     exit 1; }
          test -d dist-web/docs       || { echo "::error::dist-web/docs missing";       exit 1; }
          du -sh dist-web

      # Use the Cloudflare REST API directly rather than parsing wrangler's
      # pretty-printed table — that breaks across wrangler minor versions and
      # was the source of an earlier "process npx failed with exit code 1"
      # failure mode.
      - name: Ensure Cloudflare Pages project exists
        env:
          CF_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          api="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects"
          http=$(curl -sS -o /tmp/project.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            "${api}/${PAGES_PROJECT}")
          case "$http" in
            200)
              echo "Pages project '${PAGES_PROJECT}' already exists."
              ;;
            404)
              echo "Pages project not found; creating '${PAGES_PROJECT}'..."
              create_http=$(curl -sS -o /tmp/create.json -w '%{http_code}' \
                -H "Authorization: Bearer ${CF_TOKEN}" \
                -H "Content-Type: application/json" \
                -X POST \
                -d "{\"name\":\"${PAGES_PROJECT}\",\"production_branch\":\"main\"}" \
                "${api}")
              if [ "$create_http" != "200" ] && [ "$create_http" != "201" ]; then
                echo "::error::Project create returned HTTP ${create_http}"
                cat /tmp/create.json
                exit 1
              fi
              ;;
            401|403)
              echo "::error::Cloudflare API rejected the token (HTTP ${http}). Check that CLOUDFLARE_API_TOKEN has 'Cloudflare Pages: Edit' on this account."
              cat /tmp/project.json
              exit 1
              ;;
            *)
              echo "::error::Unexpected HTTP ${http} from Cloudflare API"
              cat /tmp/project.json
              exit 1
              ;;
          esac

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-web --project-name=${{ env.PAGES_PROJECT }} --branch=main

  # =================================================================
  # preview-web — non-production Cloudflare Pages deploy for any branch
  # push that isn't main and isn't a tag. Deploys under the branch alias
  # so the URL is <branch>.urdf-studio.pages.dev and Cloudflare treats it
  # as a preview environment (not the production main branch). Skipped
  # for PR builds — those already get covered by the manual
  # preview-web.yml workflow, and double-deploying would just burn quota.
  # =================================================================
  preview-web:
    name: Preview deploy (branch → Cloudflare Pages preview)
    needs: test
    if: >-
      github.ref != 'refs/heads/main'
      && github.event_name == 'push'
      && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build web bundle
        run: npm run web:build

      - name: Resolve preview branch alias
        id: alias
        run: |
          alias='${{ github.ref_name }}'
          # Cloudflare Pages branch aliases must match [a-z0-9-]; squash
          # other chars and trim leading/trailing dashes.
          alias=$(echo "$alias" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//')
          # Cloudflare branch field cannot exceed 28 chars and must NOT
          # equal the production branch name.
          alias=${alias:0:28}
          if [ "$alias" = "main" ]; then
            alias="branch-main"
          fi
          echo "alias=$alias" >> "$GITHUB_OUTPUT"
          echo "::notice::Preview alias for ${{ github.ref_name }} → ${alias}.urdf-studio.pages.dev"

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-web --project-name=${{ env.PAGES_PROJECT }} --branch=${{ steps.alias.outputs.alias }}

      - name: Summarize preview URL
        run: |
          echo "### Web preview deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`${{ github.ref_name }}\` → \`${{ steps.alias.outputs.alias }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: https://${{ steps.alias.outputs.alias }}.${{ env.PAGES_PROJECT }}.pages.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This is a **preview** environment, not production. The main app at urdf.deyuf.org is only updated when changes land on \`main\`." >> "$GITHUB_STEP_SUMMARY"

  # =================================================================
  # publish — VS Code Marketplace publish + GitHub Release.
  # Only on main, only after tests pass, only if package.json#version
  # changed (or workflow_dispatch with force_publish=true).
  # =================================================================
  publish:
    name: Publish to VS Code Marketplace
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Detect version change
        id: version
        run: |
          current=$(node -p "require('./package.json').version")
          previous=$(git show HEAD~1:package.json 2>/dev/null \
            | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          force='${{ github.event.inputs.force_publish }}'
          echo "current=$current"   >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ] || [ "$force" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $previous -> $current (force=$force) — will publish."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged at $current — skipping publish."
          fi

      - name: Package .vsix
        if: steps.version.outputs.should_publish == 'true'
        run: npx --yes @vscode/vsce package --out urdf-studio-${{ steps.version.outputs.current }}.vsix

      - name: Publish to Marketplace
        if: steps.version.outputs.should_publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath urdf-studio-${{ steps.version.outputs.current }}.vsix

      - name: Create GitHub Release
        if: steps.version.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.current }}
          name: v${{ steps.version.outputs.current }}
          generate_release_notes: true
          files: urdf-studio-${{ steps.version.outputs.current }}.vsix

  # =================================================================
  # publish-prerelease — VS Code Marketplace pre-release channel.
  # Fires on every push to `develop`. Auto-derives a unique version
  # from the package.json base + github.run_number so a manual bump
  # is never required: pre-release lanes use the odd-minor convention
  # (Marketplace requires pre-release versions to be strictly higher
  # than stable, and the recommended scheme is even-minor = stable,
  # odd-minor = pre-release).
  # =================================================================
  publish-prerelease:
    name: Publish pre-release to VS Code Marketplace
    needs: test
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Verify VSCE_PAT is configured
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            cat <<'EOF' >&2
          ::error::Secret VSCE_PAT is missing.

          Create an Azure DevOps personal access token with `Marketplace: Manage`
          scope (https://dev.azure.com/<your-org>/_usersSettings/tokens) and add
          it under Settings → Secrets and variables → Actions as VSCE_PAT.
          EOF
            exit 1
          fi
          echo "VSCE_PAT present (${#VSCE_PAT} chars)."

      - name: Compute pre-release version
        id: version
        run: |
          # Strip any pre-existing -beta / -rc / -dev suffix from the
          # package.json base.
          base=$(node -p "require('./package.json').version" | sed 's/-.*//')
          major=$(echo "$base" | cut -d. -f1)
          minor=$(echo "$base" | cut -d. -f2)
          # Pre-release lane lives on the next odd minor. Stable on main
          # keeps even minors (0.4.x); develop publishes 0.5.x, etc.
          if [ $((minor % 2)) -eq 0 ]; then
            minor=$((minor + 1))
          fi
          # Patch comes from the GitHub Actions run number so every push
          # produces a monotonically-increasing, unique version.
          version="${major}.${minor}.${{ github.run_number }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::Pre-release version: $version"

      - name: Stamp package.json with the pre-release version
        run: npm version --no-git-tag-version --allow-same-version ${{ steps.version.outputs.version }}

      - name: Package .vsix (pre-release flavour)
        run: npx --yes @vscode/vsce@^3.9.1 package --pre-release --out urdf-studio-${{ steps.version.outputs.version }}.vsix

      - name: Publish to Marketplace (pre-release channel)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce@^3.9.1 publish --pre-release --packagePath urdf-studio-${{ steps.version.outputs.version }}.vsix

      - name: Create GitHub pre-release tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} (pre-release)
          generate_release_notes: true
          prerelease: true
          files: urdf-studio-${{ steps.version.outputs.version }}.vsix

      - name: Summarise pre-release publish
        run: |
          {
            echo "### Pre-release published"
            echo
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Branch:  \`${{ github.ref_name }}\` (commit \`${{ github.sha }}\`)"
            echo "- Channel: VS Code Marketplace **pre-release**"
            echo
            echo "Users can install it from the Extensions view by clicking"
            echo "**Switch to Pre-Release Version** on the URDF Studio entry,"
            echo "or via CLI: \`code --install-extension deyuf.urdf-studio --pre-release\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # =================================================================
  # deploy-docs — GitHub Pages.
  # Only runs after BOTH deploy-web and publish complete successfully.
  # Reuses the test job's web-build artifact.
  # =================================================================
  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: [deploy-web, publish]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist-web

      - name: Verify docs output
        run: |
          test -f dist-web/docs/index.html || { echo "::error::dist-web/docs/index.html missing"; exit 1; }
          ls -la dist-web/docs | head

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Try to enable Pages on the very first run. The enablement API
          # technically requires `administration: write`, which GITHUB_TOKEN
          # cannot be granted (only fine-grained PATs can — and 'administration'
          # is rejected as a workflow-permission key, see GitHub Actions
          # schema). The action degrades gracefully: if enablement is denied,
          # it falls back to the existing-site lookup and emits a clear "Not
          # Found" error. In that case, do the one-time toggle by hand:
          #   Settings → Pages → Build and deployment → Source: GitHub Actions
          # Subsequent runs no-op since Pages is already enabled.
          enablement: true

      - name: Upload docs as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ship only the docs subtree — the app itself lives on Cloudflare.
          path: dist-web/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
